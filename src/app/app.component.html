<ion-app>
  <ion-split-pane contentId="main-content">
    <ion-menu contentId="main-content" type="overlay">
      <ion-content>
        <ion-list id="inbox-list">
          <ion-list-header>Hrvatski</ion-list-header>
          <ion-note>Kroatische Wörter lernen</ion-note>

          @for (p of appPages; track p; let i = $index) {
            <ion-menu-toggle auto-hide="false">
              <ion-item routerDirection="root" [routerLink]="[p.url]" lines="none" detail="false" routerLinkActive="selected">
                <ion-icon aria-hidden="true" slot="start" [ios]="p.icon + '-outline'" [md]="p.icon + '-sharp'"></ion-icon>
                <ion-label>{{ p.title }}</ion-label>
              </ion-item>
            </ion-menu-toggle>
          }
        </ion-list>

        <div class="px-4 pt-4 pb-2 border-t border-black/10 dark:border-white/10 mt-2">
          <p class="text-xs uppercase tracking-widest opacity-50 mb-3">Kategorie</p>
          <div class="flex flex-col gap-1">
            @for (cat of categoryService.categories; track cat) {
              <button
                type="button"
                (click)="setCategory(cat)"
                class="w-full py-2 px-3 rounded-xl text-sm font-semibold border transition-colors text-left"
                [class.bg-indigo-500]="categoryService.selectedCategory() === cat"
                [class.border-indigo-500]="categoryService.selectedCategory() === cat"
                [class.text-white]="categoryService.selectedCategory() === cat"
                [class.bg-transparent]="categoryService.selectedCategory() !== cat"
                [class.border-black]="categoryService.selectedCategory() !== cat"
                [class.dark:border-white]="categoryService.selectedCategory() !== cat"
                [class.border-opacity-10]="categoryService.selectedCategory() !== cat"
                [class.opacity-60]="categoryService.selectedCategory() !== cat"
              >
                {{ categoryService.categoryLabel(cat) }}
              </button>
            }
          </div>
        </div>

        <div class="px-4 pt-3 pb-6">
          <p class="text-xs uppercase tracking-widest opacity-50 mb-3">Lektionen</p>
          <div class="grid grid-cols-4 gap-2">
            @for (l of categoryService.availableLessons(); track l) {
              <button
                type="button"
                (click)="categoryService.toggleLesson(l)"
                class="flex-1 py-2 px-4 rounded-xl text-sm font-semibold border transition-colors"
                [class.bg-indigo-500]="categoryService.isLessonActive(l)"
                [class.border-indigo-500]="categoryService.isLessonActive(l)"
                [class.text-white]="categoryService.isLessonActive(l)"
                [class.bg-transparent]="!categoryService.isLessonActive(l)"
                [class.opacity-50]="!categoryService.isLessonActive(l)"
              >
                L{{ l }}
              </button>
            }
          </div>
        </div>
      </ion-content>
    </ion-menu>
    <ion-router-outlet id="main-content"></ion-router-outlet>
  </ion-split-pane>
</ion-app>
