name: Build Android APK and Deploy

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies and build web
        run: npm ci && npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Copy APK to apk directory
        run: |
          mkdir -p apk
          cp android/app/build/outputs/apk/debug/app-debug.apk apk/learn-croatian.apk

      - name: Commit APK to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apk/learn-croatian.apk
          git diff --cached --quiet || git commit -m "chore: update learn-croatian.apk"
          git push
